name: Deploy Backend to ECS

on:
  push:
    branches: [ "cloud" ]
    paths:
      - "backend/**"

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: repomind-backend
  ECS_SERVICE: repomind-service-tf
  ECS_CLUSTER: repomind-cluster
  ECS_TASK_DEFINITION: repomind-task-tf

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker image
      run: |
        docker build -t $ECR_REPOSITORY ./backend

    - name: Tag image
      run: |
        docker tag $ECR_REPOSITORY:latest \
        293693563455.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:latest

    - name: Push image to ECR
      run: |
        docker push 293693563455.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:latest

    - name: Force new ECS deployment
      run: |
        aws ecs update-service \
          --cluster $ECS_CLUSTER \
          --service $ECS_SERVICE \
          --force-new-deployment